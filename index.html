<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiniela Mundial 2026 | Halcones</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
    <style>
        :root {
            --primary: #1b5e20; --primary-light: #2e7d32;
            --secondary: #fbc02d; --secondary-dark: #f57f17;
            --dark: #212121; --light: #f4f6f5; --white: #ffffff;
            --grey-light: #e0e0e0; --grey-dark: #757575;
            --success: #4caf50; --error: #f44336;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { background-color: var(--light); color: var(--dark); line-height: 1.6; }
        .hidden { display: none !important; }

        /* VISTA DE ACCESO */
        #login-view { display: flex; justify-content: center; align-items: center; min-height: 100vh; background: linear-gradient(135deg, rgba(27, 94, 32, 0.9), rgba(33, 33, 33, 0.95)); padding: 20px; }
        .login-card { background: var(--white); padding: 40px 30px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); width: 100%; max-width: 420px; text-align: center; border-top: 6px solid var(--secondary); }
        .scout-badge { width: 80px; height: 80px; background: var(--primary); color: var(--secondary); border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 40px; margin: 0 auto 20px auto; }
        .login-card h1 { font-size: 2rem; color: var(--primary); margin-bottom: 5px; font-weight: 800; }
        .login-card h2 { font-size: 1.1rem; color: var(--grey-dark); margin-bottom: 25px; font-weight: 400; }
        .form-group { text-align: left; margin-bottom: 20px; }
        .form-group label { display: block; font-size: 0.9rem; font-weight: 600; margin-bottom: 6px; }
        .form-group input { width: 100%; padding: 12px; border: 2px solid var(--grey-light); border-radius: 8px; font-size: 1rem; }
        .btn-block { width: 100%; padding: 14px; background: var(--primary); color: var(--white); border: none; border-radius: 8px; font-size: 1.1rem; font-weight: 700; cursor: pointer; }
        
        /* DASHBOARD Y NAVEGACIÓN */
        #app-view { min-height: 100vh; display: flex; flex-direction: column; }
        navbar { background: var(--primary); color: var(--white); padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        .nav-brand { font-weight: 800; font-size: 1.2rem; }
        .user-tag { background: rgba(255,255,255,0.15); padding: 6px 12px; border-radius: 20px; font-size: 0.9rem; font-weight: 600; border-left: 3px solid var(--secondary); margin-right: 10px;}
        .btn-logout { background: transparent; color: var(--white); border: 1px solid rgba(255,255,255,0.4); padding: 6px 12px; border-radius: 6px; cursor: pointer; }
        
        .tabs-container { background: var(--white); display: flex; justify-content: center; border-bottom: 2px solid var(--grey-light); flex-wrap: wrap; }
        .tab-btn { padding: 12px 15px; background: none; border: none; font-size: 0.95rem; font-weight: 600; color: var(--grey-dark); cursor: pointer; position: relative; }
        .tab-btn.active { color: var(--primary); }
        .tab-btn.active::after { content: ''; position: absolute; bottom: -2px; left: 0; width: 100%; height: 3px; background: var(--secondary); }

        main { max-width: 900px; width: 100%; margin: 30px auto; padding: 0 20px; flex: 1; }
        .section-header { margin-bottom: 20px; color: var(--primary); font-size: 1.5rem; font-weight: 700; display: flex; justify-content: space-between; align-items: center;}
        
        /* TARJETAS DE PARTIDO */
        .match-card { background: var(--white); border-radius: 12px; padding: 20px; margin-bottom: 20px; border-left: 5px solid var(--primary); box-shadow: 0 2px 8px rgba(0,0,0,0.05);}
        .match-meta { display: flex; justify-content: space-between; font-size: 0.8rem; color: var(--grey-dark); margin-bottom: 15px; border-bottom: 1px dashed var(--grey-light); padding-bottom: 8px; font-weight: 600; }
        .match-body { display: flex; align-items: center; justify-content: space-between; text-align: center; }
        .team-box { flex: 1; font-weight: 700; }
        .team-logo { width: 40px; height: 40px; object-fit: contain; margin-bottom: 5px; }
        
        .prediction-box { display: flex; gap: 10px; background: var(--light); padding: 10px; border-radius: 12px; align-items: center;}
        .input-score { width: 45px; height: 45px; text-align: center; font-size: 1.2rem; font-weight: bold; border: 2px solid var(--grey-light); border-radius: 6px; }
        .score-display { font-size: 1.5rem; font-weight: 900; color: var(--primary); }
        .real-score-badge { background: #e8f5e9; padding: 5px 15px; border-radius: 20px; color: var(--primary); font-weight: 800; border: 1px solid #c8e6c9;}
        
        /* TABLAS Y ESTADOS */
        .loader { text-align: center; padding: 40px; color: var(--grey-dark); font-weight: bold; }
        .table-responsive { overflow-x: auto; background: var(--white); border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); margin-bottom: 30px;}
        .data-table { width: 100%; border-collapse: collapse; min-width: 600px; }
        .data-table th { background: var(--primary); color: var(--white); text-align: left; padding: 12px; }
        .data-table td { padding: 12px; border-bottom: 1px solid var(--grey-light); }
        .group-title { background: var(--secondary); padding: 8px 15px; font-weight: bold; border-radius: 8px 8px 0 0; margin-top: 20px;}
        
        .btn-action { background: var(--secondary); border: none; padding: 8px 15px; border-radius: 6px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div id="login-view">
        <div class="login-card">
            <div class="scout-badge">🦅</div>
            <h1>LA LAGUNA 2026</h1>
            <h2>Quiniela • Halcones (En Vivo)</h2>
            <form id="login-form">
                <div class="form-group">
                    <label>Tu Nombre</label>
                    <input type="text" id="username" required>
                </div>
                <div class="form-group">
                    <label>Código de Invitación</label>
                    <input type="text" id="group-code" placeholder="MUNDIAL26-HALCONES" required style="text-transform: uppercase;">
                </div>
                <button type="submit" class="btn-block">Ingresar</button>
            </form>
        </div>
    </div>

    <div id="app-view" class="hidden">
        <navbar>
            <div class="nav-brand">🦅 Halcones</div>
            <div>
                <span class="user-tag" id="user-display-name"></span>
                <button class="btn-logout" id="btn-logout">Salir</button>
            </div>
        </navbar>

        <div class="tabs-container">
            <button class="tab-btn active" data-target="partidos-section">⚽ Mis Pronósticos</button>
            <button class="tab-btn" data-target="calendario-section">📅 Calendario Oficial</button>
            <button class="tab-btn" data-target="grupos-section">📊 Fase de Grupos</button>
            <button class="tab-btn" data-target="clasificacion-section">🏆 Tabla General</button>
        </div>

        <main>
            <div id="api-status" style="background: #e3f2fd; color: #1565c0; padding: 10px; border-radius: 8px; margin-bottom: 20px; font-size: 0.85rem; text-align: center;">
                Sincronizando con los servidores de la FIFA...
            </div>

            <!-- PRONÓSTICOS -->
            <section id="partidos-section" class="view-section">
                <div class="section-header"><span>Tus Predicciones</span></div>
                <div id="matches-list-container"><div class="loader">Cargando partidos...</div></div>
            </section>

            <!-- CALENDARIO OFICIAL -->
            <section id="calendario-section" class="view-section hidden">
                <div class="section-header"><span>Partidos Oficiales</span></div>
                <div id="calendario-list-container"><div class="loader">Cargando calendario...</div></div>
            </section>

            <!-- FASE DE GRUPOS -->
            <section id="grupos-section" class="view-section hidden">
                <div class="section-header"><span>Clasificación por Grupos</span></div>
                <div id="grupos-tables-container"><div class="loader">Calculando posiciones...</div></div>
            </section>

            <!-- CLASIFICACIÓN GENERAL -->
            <section id="clasificacion-section" class="view-section hidden">
                <div class="section-header">
                    <span>Ranking de Participantes</span>
                    <button class="btn-action" onclick="descargarPDF()">📥 PDF</button>
                </div>
                <div class="table-responsive">
                    <table class="data-table">
                        <thead><tr><th>Pos</th><th>Participante</th><th style="text-align:center;">Jugados</th><th style="text-align:right;">Puntos</th></tr></thead>
                        <tbody id="leaderboard-tbody"></tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>

    <script>
        // =========================================================
        // CONFIGURACIÓN DE LA API (¡AQUÍ PONES TU CLAVE!)
        // =========================================================
        const API_KEY = "02d52ad09dacaaa599c59c1690d5ee4b"; // Regístrate en api-sports.io para obtener una.
        const API_HOST = "v3.football.api-sports.io";
        const LEAGUE_ID = 1; // ID 1 corresponde a la World Cup en esta API
        const SEASON = 2026; 
        const SECRET_CODE = "MUNDIAL26-HALCONES";

        let currentUser = localStorage.getItem('quiniela_current_user');
        let partidosOficiales = [];
        let resultadosReales = {}; // Se llenará automáticamente con la API

        // INICIALIZACIÓN
        function init() {
            if(!localStorage.getItem('quiniela_users_list')) localStorage.setItem('quiniela_users_list', JSON.stringify([]));
            if (currentUser) {
                showDashboard();
            }
            
            // Navegación de pestañas
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                    document.querySelectorAll('.view-section').forEach(s => s.classList.add('hidden'));
                    this.classList.add('active');
                    document.getElementById(this.dataset.target).classList.remove('hidden');
                });
            });
        }

        // LOGIN
        document.getElementById('login-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const user = document.getElementById('username').value.trim();
            const code = document.getElementById('group-code').value.trim().toUpperCase();

            if (code === SECRET_CODE) {
                currentUser = user;
                localStorage.setItem('quiniela_current_user', user);
                
                let usersList = JSON.parse(localStorage.getItem('quiniela_users_list'));
                if(!usersList.includes(user)) { usersList.push(user); localStorage.setItem('quiniela_users_list', JSON.stringify(usersList)); }
                
                showDashboard();
            } else { alert("Código de acceso incorrecto."); }
        });

        document.getElementById('btn-logout').addEventListener('click', () => {
            localStorage.removeItem('quiniela_current_user'); currentUser = null;
            location.reload();
        });

        function showDashboard() {
            document.getElementById('login-view').classList.add('hidden'); 
            document.getElementById('app-view').classList.remove('hidden');
            document.getElementById('user-display-name').textContent = currentUser;
            fetchDataFromAPI();
        }

        // =========================================================
        // MOTOR DE CONEXIÓN CON LA API DE DEPORTES
        // =========================================================
        async function fetchDataFromAPI() {
            const statusDiv = document.getElementById('api-status');
            
            // MOCK DE EMERGENCIA (Se ejecuta si no has puesto tu API Key real)
            if (API_KEY === "02d52ad09dacaaa599c59c1690d5ee4b") {
                statusDiv.innerHTML = "⚠️ MODO PRUEBA: Falta configurar la API Key. Mostrando datos de simulación.";
                statusDiv.style.background = "#fff3e0"; statusDiv.style.color = "#e65100";
                
                // Generamos datos falsos para que no se rompa la app
                partidosOficiales = [
                    { id: 1, grupo: "A", local: "México", logoL: "https://media.api-sports.io/football/teams/16.png", visitante: "Polonia", logoV: "https://media.api-sports.io/football/teams/24.png", fecha: "2026-06-11", status: "Match Finished", golesL: 2, golesV: 1 },
                    { id: 2, grupo: "B", local: "Canadá", logoL: "https://media.api-sports.io/football/teams/5535.png", visitante: "Marruecos", logoV: "https://media.api-sports.io/football/teams/31.png", fecha: "2026-06-12", status: "Not Started", golesL: null, golesV: null }
                ];
            } else {
                // LLAMADA REAL A LA API
                try {
                    const response = await fetch(`https://${API_HOST}/fixtures?league=${LEAGUE_ID}&season=${SEASON}`, {
                        method: "GET",
                        headers: { "x-rapidapi-host": API_HOST, "x-rapidapi-key": API_KEY }
                    });
                    const data = await response.json();
                    
                    if(data.errors && data.errors.length > 0) throw new Error("Error en la API Key o permisos.");
                    
                    // Transformar la compleja respuesta de la API a nuestro modelo simplificado
                    partidosOficiales = data.response.map(match => {
                        return {
                            id: match.fixture.id,
                            grupo: match.league.round.replace('Group Stage - ', ''), // Extrae la letra del grupo
                            local: match.teams.home.name,
                            logoL: match.teams.home.logo,
                            visitante: match.teams.away.name,
                            logoV: match.teams.away.logo,
                            fecha: new Date(match.fixture.date).toLocaleDateString(),
                            status: match.fixture.status.long,
                            golesL: match.goals.home,
                            golesV: match.goals.away
                        };
                    });
                    statusDiv.innerHTML = "✅ Conectado a la base de datos oficial en vivo.";
                    statusDiv.style.background = "#e8f5e9"; statusDiv.style.color = "#2e7d32";
                } catch (error) {
                    console.error("Error fetching API:", error);
                    statusDiv.innerHTML = "❌ Fallo al conectar con la API. Revisa tu consola.";
                    return;
                }
            }

            // Procesar resultados oficiales automatizados
            resultadosReales = {};
            partidosOficiales.forEach(p => {
                if(p.status === "Match Finished" || p.golesL !== null) {
                    resultadosReales[p.id] = { l: p.golesL, v: p.golesV };
                }
            });

            // Disparar las actualizaciones de las vistas
            renderMatchesUI();
            renderCalendarioUI();
            renderGruposUI();
            calculateLeaderboard();
        }

        // =========================================================
        // RENDERIZADO DE VISTAS CON LOS DATOS DE LA API
        // =========================================================
        function renderMatchesUI() {
            const container = document.getElementById('matches-list-container');
            container.innerHTML = '';
            const userPreds = JSON.parse(localStorage.getItem(`pred_${currentUser}`)) || {};

            partidosOficiales.forEach(match => {
                const pred = userPreds[match.id] || { l: '', v: '' };
                const isFinished = resultadosReales[match.id] !== undefined;
                
                const card = document.createElement('div'); card.className = 'match-card';
                
                let actionArea = isFinished ? `
                    <div style="text-align:center; padding:10px; background:#f5f5f5; border-radius:8px;">
                        <div style="font-size:0.8rem; color:#666; margin-bottom:5px;">Resultado Oficial FIFA</div>
                        <div class="score-display">${resultadosReales[match.id].l} - ${resultadosReales[match.id].v}</div>
                        <div style="font-size:0.85rem; margin-top:5px;">Tu pronóstico fue: <b>${pred.l !== '' ? pred.l : '-'} a ${pred.v !== '' ? pred.v : '-'}</b></div>
                    </div>
                ` : `
                    <div class="prediction-box">
                        <input type="number" id="pl-${match.id}" class="input-score" value="${pred.l}">
                        <span>VS</span>
                        <input type="number" id="pv-${match.id}" class="input-score" value="${pred.v}">
                        <button class="btn-action" style="margin-left:auto;" onclick="savePrediction(${match.id})">Guardar</button>
                    </div>
                `;

                card.innerHTML = `
                    <div class="match-meta"><span>📅 ${match.fecha} | Grupo ${match.grupo}</span><span>${match.status}</span></div>
                    <div class="match-body" style="margin-bottom:15px;">
                        <div class="team-box"><img src="${match.logoL}" class="team-logo"><br>${match.local}</div>
                        <div class="team-box"><img src="${match.logoV}" class="team-logo"><br>${match.visitante}</div>
                    </div>
                    ${actionArea}
                `;
                container.appendChild(card);
            });
        }

        function renderCalendarioUI() {
            const container = document.getElementById('calendario-list-container');
            container.innerHTML = partidosOficiales.map(m => `
                <div style="background:white; padding:15px; border-radius:8px; margin-bottom:10px; display:flex; justify-content:space-between; align-items:center; border-left:4px solid var(--primary);">
                    <div>
                        <div style="font-size:0.8rem; color:#888;">Grupo ${m.grupo} - ${m.fecha}</div>
                        <div style="font-weight:bold; display:flex; align-items:center; gap:10px;">
                            <img src="${m.logoL}" width="20"> ${m.local} vs ${m.visitante} <img src="${m.logoV}" width="20">
                        </div>
                    </div>
                    <div>
                        ${resultadosReales[m.id] ? `<span class="real-score-badge">${resultadosReales[m.id].l} - ${resultadosReales[m.id].v}</span>` : `<span style="font-size:0.9rem; color:#999;">${m.status}</span>`}
                    </div>
                </div>
            `).join('');
        }

        function renderGruposUI() {
            const container = document.getElementById('grupos-tables-container');
            container.innerHTML = '';
            let groups = {};

            partidosOficiales.forEach(p => {
                if(!groups[p.grupo]) groups[p.grupo] = {};
                if(!groups[p.grupo][p.local]) groups[p.grupo][p.local] = { logo: p.logoL, pj:0, pts:0, dif:0 };
                if(!groups[p.grupo][p.visitante]) groups[p.grupo][p.visitante] = { logo: p.logoV, pj:0, pts:0, dif:0 };

                if(resultadosReales[p.id]) {
                    let real = resultadosReales[p.id], loc = groups[p.grupo][p.local], vis = groups[p.grupo][p.visitante];
                    loc.pj++; vis.pj++;
                    loc.dif += (real.l - real.v); vis.dif += (real.v - real.l);
                    if(real.l > real.v) loc.pts+=3; else if(real.l < real.v) vis.pts+=3; else { loc.pts+=1; vis.pts+=1; }
                }
            });

            Object.keys(groups).sort().forEach(gKey => {
                let teams = Object.keys(groups[gKey]).map(name => ({ name, ...groups[gKey][name] }));
                teams.sort((a, b) => b.pts - a.pts || b.dif - a.dif);
                
                let tbody = teams.map((t, i) => `<tr><td>${i+1}</td><td><img src="${t.logo}" width="20" style="vertical-align:middle; margin-right:5px;">${t.name}</td><td style="text-align:center;">${t.pj}</td><td style="text-align:center;">${t.dif}</td><td style="text-align:center; font-weight:bold; color:var(--primary);">${t.pts}</td></tr>`).join('');
                
                container.innerHTML += `<div class="group-title">Grupo ${gKey}</div><div class="table-responsive"><table class="data-table"><thead><tr><th>#</th><th>Equipo</th><th style="text-align:center;">PJ</th><th style="text-align:center;">DIF</th><th style="text-align:center;">PTS</th></tr></thead><tbody>${tbody}</tbody></table></div>`;
            });
        }

        window.savePrediction = function(id) {
            const l = document.getElementById(`pl-${id}`).value;
            const v = document.getElementById(`pv-${id}`).value;
            if(l==='' || v==='') return alert("Llenar ambos campos");
            let preds = JSON.parse(localStorage.getItem(`pred_${currentUser}`)) || {};
            preds[id] = {l: parseInt(l), v: parseInt(v)};
            localStorage.setItem(`pred_${currentUser}`, JSON.stringify(preds));
            alert("Guardado exitosamente");
        }

        function computePoints(pred, real) {
            if(!pred || !real) return 0;
            if(pred.l === real.l && pred.v === real.v) return 3;
            if(Math.sign(pred.l - pred.v) === Math.sign(real.l - real.v)) return 1;
            return 0;
        }

        function calculateLeaderboard() {
            const users = JSON.parse(localStorage.getItem('quiniela_users_list')) || [];
            let rank = users.map(u => {
                let p = 0, j = 0, preds = JSON.parse(localStorage.getItem(`pred_${u}`)) || {};
                partidosOficiales.forEach(m => {
                    if(resultadosReales[m.id] && preds[m.id]) { p += computePoints(preds[m.id], resultadosReales[m.id]); j++; }
                });
                return { name: u, pts: p, jug: j };
            }).sort((a,b) => b.pts - a.pts);

            document.getElementById('leaderboard-tbody').innerHTML = rank.map((u, i) => `
                <tr style="${u.name === currentUser ? 'background: rgba(251, 192, 45, 0.15)' : ''}">
                    <td>${i+1}</td><td style="font-weight:${u.name === currentUser ? 'bold':'normal'};">${u.name}</td>
                    <td style="text-align:center;">${u.jug}</td><td style="text-align:right; font-weight:bold; color:var(--primary);">${u.pts} pts</td>
                </tr>
            `).join('');
        }

        // PDF Generation
        window.descargarPDF = function() {
            const { jsPDF } = window.jspdf; const doc = new jsPDF('p', 'mm', 'a4');
            doc.setFontSize(18); doc.text("Quiniela Mundial 2026 - Halcones", 14, 20);
            
            const users = JSON.parse(localStorage.getItem('quiniela_users_list')) || [];
            let data = users.map(u => {
                let p = 0, j = 0, preds = JSON.parse(localStorage.getItem(`pred_${u}`)) || {};
                partidosOficiales.forEach(m => { if(resultadosReales[m.id] && preds[m.id]) { p += computePoints(preds[m.id], resultadosReales[m.id]); j++; }});
                return [u, j, p];
            }).sort((a,b) => b[2] - a[2]);

            doc.autoTable({ startY: 30, head: [['Participante', 'Jugados', 'Puntos']], body: data, headStyles: { fillColor: [27, 94, 32] } });
            doc.save("Reporte_Halcones.pdf");
        }

        init();
    </script>
</body>
</html>
